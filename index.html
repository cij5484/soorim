      function formatTVDate(dateString) {
        const d = parseLocalDate(dateString);
        return `${d.getMonth() + 1}/${d.getDate()}`;
      }

      function formatTVTime(time) {
        if (!time) return "";
        const parts = String(time).split(":");
        if (parts.length < 2) return time;

        let hour = Number(parts[0]);
        const minute = parts[1];

        // PPT처럼 17:00 -> 5:00 표시
        if (hour > 12) hour -= 12;

        return `${hour}:${minute}`;
      }

      function getTVSeatText(r) {
        return getSeatDisplayText(r);
      }

      function getMenuDisplayText(menu) {
        return String(menu || "")
          .replace(/([A-Z가-힣])코스\s+(\d+)/g, "$1코스$2")
          .trim();
      }

      function getPeopleDisplayText(r) {
        const adult = Number(r.adult) || 0;
        const child = Number(r.child) || 0;
        const people = Number(r.people) || 0;

        const directText = String(r.peopleText || "").trim();

        // 예전 코드에서 자동 저장됐던 문구들은 직접입력으로 보지 않음
        const oldAutoTexts = new Set([
          adult > 0 && child > 0 ? `성인 ${adult}명, 아이 ${child}명` : "",
          adult > 0 ? `성인 ${adult}명` : "",
          child > 0 ? `아이 ${child}명` : "",
        ]);

        // 1순위: 직접입력 표시칸
        // 예: 10~20명, 35~40명, 단체 25명
        if (directText && !oldAutoTexts.has(directText)) {
          return directText;
        }

        // 2순위: 성인 + 아이가 같이 있으면 반드시 구분
        // 성인 수는 메뉴 수와 관련, 아이 수는 좌석 수와 관련
        if (adult > 0 && child > 0) {
          return `성인${adult} 아이${child}`;
        }

        // 3순위: 성인만 있으면 자연스럽게 N명
        if (adult > 0) {
          return `${adult}명`;
        }

        // 4순위: 아이만 있는 경우는 거의 없지만 방어용
        if (child > 0) {
          return `아이${child}`;
        }

        // 5순위: 예전 데이터에 people 숫자만 있는 경우
        if (people > 0) {
          return `${people}명`;
        }

        return "-";
      }

      // 기존 TV 코드들이 깨지지 않게 이름은 그대로 연결해둠
      function getTVPeopleText(r) {
        return getPeopleDisplayText(r);
      }

      function isAdReservation(r) {
        const text = `${r?.memo || ""} ${r?.menu || ""}`;

        return /(릴스\s*촬영|리뷰\s*노트|체험단)/.test(text);
      }

      function getDisplayStatus(status) {
        if (status === "퇴장") return "도착";
        if (status === "착석") return "도착";
        if (status === "도착") return "도착";
        return "예약";
      }

      function formatCustomerNameWithNim(name) {
        const cleanName = String(name || "").trim();

        if (!cleanName) return "";

        // 이미 님으로 끝나면 그대로 사용
        if (cleanName.endsWith("님")) return cleanName;

        // 이름 안에 공백이 있으면 억지로 쪼개지 않고 님만 붙임
        // 예: 박영기 동그라미골프 → 박영기 동그라미골프님
        if (/\s/.test(cleanName)) {
          return `${cleanName}님`;
        }

        // 한 글자 이름은 그냥 님만 붙임
        if (cleanName.length <= 1) {
          return `${cleanName}님`;
        }

        // 홍길동 → 홍 길동님
        return `${cleanName.slice(0, 1)} ${cleanName.slice(1)}님`;
      }

      function getReservationDisplayName(r) {
        const name = String(r?.name || "").trim();

        if (!name) return "";

        const displayName = r.nameDisplayMode
          ? formatCustomerNameWithNim(name)
          : name;

        return isAdReservation(r) ? `${displayName}*` : displayName;
      }

      function isSeatUnconfirmed(r) {
        const seat = String(r?.seat || "").trim();
        const room = String(r?.room || "").trim();
        const table = String(r?.table || "").trim();

        if (!seat) return true;

        // 홀은 테이블 번호가 있어야 좌석 확정
        if (seat === "홀") {
          return !table;
        }

        // 룸은 room 값이 있으면 전체룸/부분룸 모두 좌석 확정으로 봄
        if (seat === "룸") {
          return !room;
        }

        return false;
      }

      function isMenuUnconfirmed(r) {
        const menu = String(r?.menu || "").trim();

        if (!menu) return true;
        if (menu === "-") return true;
        if (/메뉴\s*전화/.test(menu)) return true;
        if (/메뉴\s*다시\s*전화/.test(menu)) return true;
        if (/다시\s*전화/.test(menu)) return true;
        if (/미정/.test(menu)) return true;

        return false;
      }

      function isReservationUnconfirmed(r) {
        return isSeatUnconfirmed(r) || isMenuUnconfirmed(r);
      }

      function getSeatDisplayText(r) {
        const seat = String(r.seat || "").trim();
        const room = String(r.room || "").trim();
        const table = String(r.table || "").trim();

        if (!seat && !room && !table) {
          return "-";
        }

        function formatTableText(value) {
          return String(value || "")
            .split(",")
            .map((v) => v.trim())
            .filter(Boolean)
            .map((v) => v.replace(/번$/g, ""))
            .join(", ");
        }

        function formatRoomText(value) {
          return String(value || "")
            .split(",")
            .map((v) => v.trim())
            .filter(Boolean)
            .join(", ");
        }

        // 룸 예약
        if (seat === "룸") {
          const roomText = formatRoomText(room);

          // 룸만 있고 몇 실인지 없으면 그냥 "룸"
          if (!roomText && !table) {
            return "룸";
          }

          if (table) {
            return roomText
              ? `룸 ${roomText} ${formatTableText(table)}`
              : `룸 ${formatTableText(table)}`;
          }

          return `룸 ${roomText}`;
        }

        // 홀 예약
        if (seat === "홀") {
          if (table) {
            return `홀 ${formatTableText(table)}`;
          }

          return "홀";
        }

        // 예외 데이터 방어용
        const parts = [];

        if (seat) parts.push(seat);
        if (room) parts.push(formatRoomText(room));
        if (table) parts.push(formatTableText(table));

        return parts.length ? parts.join(" ") : "-";
      }

      function getSeatDisplayHtml(r, mode = "card") {
        const seatText = getSeatDisplayText(r);
        const className = mode === "tv" ? "room-word-tv" : "room-word-card";

        return escapeHtml(seatText).replace(
          /룸/g,
          `<span class="${className}">룸</span>`,
        );
      }

      function getReservationTimeMinutes(timeText) {
        const match = String(timeText || "").match(/(\d{1,2}):(\d{2})/);
        if (!match) return 0;

        const hour = Number(match[1]) || 0;
        const minute = Number(match[2]) || 0;

        return hour * 60 + minute;
      }

      let tvDateOffset = 0; // -1 어제, 0 오늘, 1 내일

      function getTVTargetDateString() {
        const baseDate = parseLocalDate(getTodayString());
        baseDate.setDate(baseDate.getDate() + tvDateOffset);

        const y = baseDate.getFullYear();
        const m = String(baseDate.getMonth() + 1).padStart(2, "0");
        const d = String(baseDate.getDate()).padStart(2, "0");

        return `${y}-${m}-${d}`;
      }

      function getTVReservationTitleText() {
        if (tvDateOffset === -1) return "어제 예약 ";
        if (tvDateOffset === 1) return "내일 예약 ";
        return "오늘 예약 ";
      }

      function changeTVDateOffset(amount) {
        const nextOffset = tvDateOffset + amount;

        if (nextOffset < -1 || nextOffset > 1) return;

        tvDateOffset = nextOffset;
        renderTVView();
      }

      window.changeTVDateOffset = changeTVDateOffset;

      const TV_RESERVATION_NOTICE_DURATION = 5 * 60 * 1000; // 5분

      let tvReservationNoticeMap = {};
      let tvReservationNoticeBaselineReady = false;
      let tvReservationNoticeTimer = null;

      function getTVNoticeReservationKey(r) {
        return String(
          r?.id ||
            `${r?.date || ""}-${r?.time || ""}-${r?.name || ""}-${r?.phone || ""}`,
        );
      }

      function getTVNoticeSnapshot(r) {
        return {
          date: String(r?.date || ""),
          time: String(r?.time || ""),
          name: String(getReservationDisplayName(r) || ""),
          people: String(getTVPeopleText(r) || ""),
          seat: String(getTVSeatText(r) || ""),
          menu: String(getMenuDisplayText(r?.menu) || ""),
          status: String(getDisplayStatus(r?.status) || ""),
          tvHidden: r?.tvHidden === true ? "1" : "0",
        };
      }

      function getTVChangedFields(previousSnapshot, nextSnapshot) {
        const fields = [];

        // 날짜가 바뀐 경우도 시간 칸 쪽에 표시
        if (
          previousSnapshot.date !== nextSnapshot.date ||
          previousSnapshot.time !== nextSnapshot.time
        ) {
          fields.push("time");
        }

        if (previousSnapshot.name !== nextSnapshot.name) {
          fields.push("name");
        }

        if (previousSnapshot.people !== nextSnapshot.people) {
          fields.push("people");
        }

        if (previousSnapshot.seat !== nextSnapshot.seat) {
          fields.push("seat");
        }

        if (previousSnapshot.menu !== nextSnapshot.menu) {
          fields.push("menu");
        }

        
        return [...new Set(fields)];
      }

      function cleanupExpiredTVReservationNotices() {
        const now = Date.now();

        Object.keys(tvReservationNoticeMap).forEach((key) => {
          if ((tvReservationNoticeMap[key]?.until || 0) <= now) {
            delete tvReservationNoticeMap[key];
          }
        });
      }

      function scheduleTVReservationNoticeCleanup() {
        clearTimeout(tvReservationNoticeTimer);

        const now = Date.now();

        const remainTimes = Object.values(tvReservationNoticeMap)
          .map((notice) => (notice.until || 0) - now)
          .filter((time) => time > 0);

        if (!remainTimes.length) return;

        const nextDelay = Math.min(...remainTimes);

        tvReservationNoticeTimer = setTimeout(() => {
          cleanupExpiredTVReservationNotices();

          if (document.body.classList.contains("tv-mode-body")) {
            renderTVView();
          }

          scheduleTVReservationNoticeCleanup();
        }, nextDelay + 50);
      }

      function setTVReservationNotice(key, notice) {
        if (!key) return;

        const previousNotice = tvReservationNoticeMap[key] || {};
        const previousFields = Array.isArray(previousNotice.fields)
          ? previousNotice.fields
          : [];
        const nextFields = Array.isArray(notice.fields) ? notice.fields : [];

        const mergedFields = [...new Set([...previousFields, ...nextFields])];

        // 신규 알림이 이미 있으면 신규 상태를 유지한다.
        // 예: 새 예약 추가 후 5분 안에 인원 수정 → 행 깜빡임 유지 + 인원 점 표시
        const mergedType =
          previousNotice.type === "new" || notice.type === "new"
            ? "new"
            : "updated";

        tvReservationNoticeMap[key] = {
          ...previousNotice,
          ...notice,
          type: mergedType,
          fields: mergedFields,
          until: Date.now() + TV_RESERVATION_NOTICE_DURATION,
        };

        scheduleTVReservationNoticeCleanup();
      }

      function updateTVReservationNotices(previousReservations, nextReservations) {
        cleanupExpiredTVReservationNotices();
        cleanupExpiredTVCanceledReservations();

        // 앱 첫 로딩 때 기존 예약들을 전부 신규/취소로 표시하지 않기 위한 기준선
        if (!tvReservationNoticeBaselineReady) {
          tvReservationNoticeBaselineReady = true;
          scheduleTVReservationNoticeCleanup();
          return;
        }

        const previousMap = new Map();
        const nextMap = new Map();

        previousReservations.forEach((r) => {
          previousMap.set(getTVNoticeReservationKey(r), r);
        });

        nextReservations.forEach((r) => {
          nextMap.set(getTVNoticeReservationKey(r), r);
        });

        nextReservations.forEach((r) => {
          const key = getTVNoticeReservationKey(r);
          const previousReservation = previousMap.get(key);
          const nextSnapshot = getTVNoticeSnapshot(r);

          // 새 예약
          if (!previousReservation) {
            setTVReservationNotice(key, {
              type: "new",
              fields: [],
            });
            return;
          }

          // 기존 예약 변경
          const previousSnapshot = getTVNoticeSnapshot(previousReservation);
          const changedFields = getTVChangedFields(previousSnapshot, nextSnapshot);

          if (changedFields.length) {
            setTVReservationNotice(key, {
              type: "updated",
              fields: changedFields,
            });
          }
        });

        // 삭제된 예약 감지
        previousReservations.forEach((r) => {
          const key = getTVNoticeReservationKey(r);

          if (!nextMap.has(key)) {
            addTVCanceledReservation(r);
          }
        });
      }

      function getTVReservationNotice(r) {
        cleanupExpiredTVReservationNotices();

        const key = getTVNoticeReservationKey(r);
        return tvReservationNoticeMap[key] || null;
      }

      function getTVReservationNoticeType(r) {
        return getTVReservationNotice(r)?.type || "";
      }

      function getTVFieldNoticeDot(r, fieldName) {
        const notice = getTVReservationNotice(r);

        if (!notice) return "";

        const fields = notice.fields || [];

        if (!fields.includes(fieldName)) return "";

        return `<span class="tv-change-dot"></span>`;
      }

      function wrapTVNoticeContent(contentHtml, r, fieldName) {
        return `
          <span class="tv-notice-wrap">
            ${contentHtml}
            ${getTVFieldNoticeDot(r, fieldName)}
          </span>
        `;
      }

      const TV_CANCELED_RESERVATIONS_STORAGE_KEY =
        "soorim-tv-canceled-reservations-v1";

      let tvCanceledReservationMap = loadTVCanceledReservationsFromStorage();

      function loadTVCanceledReservationsFromStorage() {
        try {
          const raw = localStorage.getItem(TV_CANCELED_RESERVATIONS_STORAGE_KEY);
          if (!raw) return {};

          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (error) {
          console.warn("취소 예약 알림 불러오기 실패:", error);
          return {};
        }
      }

      function saveTVCanceledReservationsToStorage() {
        try {
          localStorage.setItem(
            TV_CANCELED_RESERVATIONS_STORAGE_KEY,
            JSON.stringify(tvCanceledReservationMap),
          );
        } catch (error) {
          console.warn("취소 예약 알림 저장 실패:", error);
        }
      }

      function cleanupExpiredTVCanceledReservations() {
        const todayString = getTodayString();
        let changed = false;

        Object.keys(tvCanceledReservationMap).forEach((key) => {
          const item = tvCanceledReservationMap[key];

          // 예약 날짜가 오늘보다 이전이면 자동 삭제
          if (!item?.date || String(item.date) < todayString) {
            delete tvCanceledReservationMap[key];
            changed = true;
          }
        });

        if (changed) {
          saveTVCanceledReservationsToStorage();
        }
      }

      function getTVCanceledReservationSnapshot(r) {
        const snapshot = getTVNoticeSnapshot(r);

        const reservationData = {
          ...r,
        };

        const originalId = reservationData.id || "";
        delete reservationData.id;

        return {
          key: getTVNoticeReservationKey(r),
          originalId,
          date: snapshot.date,
          time: snapshot.time,
          name: snapshot.name,
          people: snapshot.people,
          seat: snapshot.seat,
          menu: snapshot.menu,
          deletedAt: Date.now(),

          // 되돌리기용 원본 예약 데이터
          reservationData,
        };
      }

      function addTVCanceledReservation(r) {
        if (!r) return;

        const item = getTVCanceledReservationSnapshot(r);

        if (!item.key || !item.date) return;

        // 이미 같은 취소 알림이 있으면 중복 추가하지 않음
        tvCanceledReservationMap[item.key] = item;

        cleanupExpiredTVCanceledReservations();
        saveTVCanceledReservationsToStorage();
      }

      function getTVCanceledReservationsForDate(dateString) {
        cleanupExpiredTVCanceledReservations();

        return Object.values(tvCanceledReservationMap)
          .filter((item) => String(item.date || "") === String(dateString || ""))
          .sort((a, b) => {
            const timeCompare = String(a.time || "").localeCompare(
              String(b.time || ""),
            );

            if (timeCompare !== 0) return timeCompare;

            return String(a.name || "").localeCompare(String(b.name || ""));
          });
      }

      function clearTVCanceledReservationsForDate(dateString) {
        Object.keys(tvCanceledReservationMap).forEach((key) => {
          const item = tvCanceledReservationMap[key];

          if (String(item?.date || "") === String(dateString || "")) {
            delete tvCanceledReservationMap[key];
          }
        });

        saveTVCanceledReservationsToStorage();

        if (document.body.classList.contains("tv-mode-body")) {
          renderTVView();
        }
      }

      function deleteTVCanceledReservation(encodedKey) {
        const key = decodeURIComponent(encodedKey || "");

        if (!key || !tvCanceledReservationMap[key]) return;

        delete tvCanceledReservationMap[key];
        saveTVCanceledReservationsToStorage();

        if (document.body.classList.contains("tv-mode-body")) {
          renderTVView();
        }
      }

      async function restoreTVCanceledReservation(encodedKey) {
        const key = decodeURIComponent(encodedKey || "");
        const item = tvCanceledReservationMap[key];

        if (!item) {
          alert("되돌릴 취소 예약을 찾을 수 없습니다.");
          return;
        }

        if (!item.reservationData) {
          alert("이 취소 알림은 이전 형식이라 되돌리기를 할 수 없습니다.");
          return;
        }

        if (!requireLogin()) return;

        const ok = confirm(
          `아래 취소 예약을 다시 예약 현황으로 되돌릴까요?\n\n` +
            `${item.time || "-"} ${item.name || "이름없음"}\n` +
            `${item.people || "-"} / ${item.seat || "-"}${item.menu ? " / " + item.menu : ""}`,
        );

        if (!ok) return;

        try {
          const restoreData = {
            ...item.reservationData,
          };

          delete restoreData.id;

          if (item.originalId) {
            await setDoc(doc(db, "reservations", item.originalId), restoreData);
          } else {
            await addDoc(reservationsCollection, restoreData);
          }

          delete tvCanceledReservationMap[key];
          saveTVCanceledReservationsToStorage();

          if (document.body.classList.contains("tv-mode-body")) {
            renderTVView();
          }
        } catch (error) {
          console.error("취소 예약 되돌리기 오류:", error);
          alert("예약 되돌리기 중 오류가 발생했습니다.");
        }
      }

              .map((v) => v.trim())
              .filter(Boolean);

            // 1) 테이블 번호가 직접 입력된 예약
            if (tables.includes(tableText)) return true;

            // 2) 룸 전체 예약 처리
            if ((r.seat || "") !== "룸") return false;
            if (tables.length > 0) return false;

            const rooms = String(r.room || "")
              .split(",")
              .map((v) => v.trim())
              .filter(Boolean);

            const roomTableMap = {
              "1실": ["21", "22", "23", "24"],
              "2실": ["31", "32", "33", "34"],
              "3실": ["41", "42", "43", "44"],
              "4실": ["51", "52", "53", "54"],
              "5실": ["61", "62", "63", "64"],
            };

            return rooms.some((room) => {
              const roomTables = roomTableMap[room] || [];
              return roomTables.includes(tableText);
            });
          })
          .sort((a, b) =>
            String(a.time || "").localeCompare(String(b.time || "")),
          )
          .slice(0, 2);
      }

      function getReservationColorKey(r) {
        return String(
          r?.id ||
            `${r?.date || ""}-${r?.time || ""}-${r?.name || ""}-${r?.phone || ""}-${r?.table || ""}-${r?.room || ""}`,
        );
      }

      function getSeatMapReservationColors() {
        return [
          { bg: "#dbeafe" }, // 파랑
          { bg: "#dcfce7" }, // 초록
          { bg: "#fef3c7" }, // 노랑
          { bg: "#fce7f3" }, // 분홍
          { bg: "#ede9fe" }, // 보라
          { bg: "#cffafe" }, // 청록
          { bg: "#ffedd5" }, // 주황
          { bg: "#e0f2fe" }, // 하늘
          { bg: "#ecfccb" }, // 연두
          { bg: "#fee2e2" }, // 빨강

          { bg: "#f3e8ff" }, // 연보라
          { bg: "#ccfbf1" }, // 민트
          { bg: "#fef9c3" }, // 연노랑
          { bg: "#fae8ff" }, // 자주
          { bg: "#e0e7ff" }, // 남보라
          { bg: "#d1fae5" }, // 진연두
          { bg: "#fffbeb" }, // 아이보리
          { bg: "#f1f5f9" }, // 회청
          { bg: "#ffe4e6" }, // 장미
          { bg: "#e7e5e4" }, // 베이지

          { bg: "#bfdbfe" }, // 진연파랑
          { bg: "#bbf7d0" }, // 진연초록
          { bg: "#fde68a" }, // 진연노랑
          { bg: "#fecdd3" }, // 진연분홍
        ];
      }

      function getReservationColorIndex(r) {
        const colors = getSeatMapReservationColors();
        const targetKey = getReservationColorKey(r);

        const dayReservations = reservations
          .filter((item) => String(item.date || "") === String(r?.date || selectedDate || ""))
          .slice()
          .sort((a, b) => {
            const timeCompare = String(a.time || "").localeCompare(String(b.time || ""));
            if (timeCompare !== 0) return timeCompare;

            const nameCompare = String(a.name || "").localeCompare(String(b.name || ""));
            if (nameCompare !== 0) return nameCompare;

            return getReservationColorKey(a).localeCompare(getReservationColorKey(b));
          });

        const uniqueKeys = [];

        dayReservations.forEach((item) => {
          const key = getReservationColorKey(item);

          if (!uniqueKeys.includes(key)) {
            uniqueKeys.push(key);
          }
        });

        const index = uniqueKeys.indexOf(targetKey);

        if (index >= 0) {
          return index % colors.length;
        }

        return 0;
      }

      function getReservationSlotColorStyle(r) {
        if (!r) return "";

        const colors = getSeatMapReservationColors();
        const color = colors[getReservationColorIndex(r)];

        return `style="--seat-slot-bg:${color.bg};"`;
      }

      function getTableSlotText(r) {
        if (!r) return "";

        const time = r.time || "";
        const name = r.name || "";
        const peoplePc = r.people ? `${r.people}명` : "";
        const peopleMobile = r.people ? `${r.people}` : "";

        return `
        <span class="seat-map-time">${escapeHtml(time)}</span>
        <span class="seat-map-name">${escapeHtml(name)}</span>
        <span class="seat-map-people">
  <span class="pc-text">${escapeHtml(peoplePc)}</span>
  <span class="mobile-text">${escapeHtml(peopleMobile)}</span>
</span>
      `;

      function normalizeModalSeatPickTables(selectedTables) {
        const roomTableMap = {
          "1실": ["21", "22", "23", "24"],
          "2실": ["31", "32", "33", "34"],
          "3실": ["41", "42", "43", "44"],
          "4실": ["51", "52", "53", "54"],
          "5실": ["61", "62", "63", "64"],
        };

        const selectedSet = new Set(selectedTables.map(String));

        const selectedRooms = [];

        Object.entries(roomTableMap).forEach(([roomName, tables]) => {
          const hasAny = tables.some((table) => selectedSet.has(table));
          const hasAll = tables.every((table) => selectedSet.has(table));

          if (hasAny) {
            selectedRooms.push({
              roomName,
              tables,
              hasAll,
            });
          }
        });

        // 룸 테이블이 아니면 그대로 사용
        if (!selectedRooms.length) {
          return {
            tableValue: selectedTables.join(","),
            fullRooms: [],
          };
        }

        // 선택된 룸들이 모두 4개 테이블 전체 선택인 경우
        // 예: 1실 21,22,23,24 / 1실+2실 전체 등
        const allSelectedRoomsAreFull = selectedRooms.every(
          (room) => room.hasAll,
        );

        if (allSelectedRoomsAreFull) {
          return {
            tableValue: "",
            fullRooms: selectedRooms.map((room) => room.roomName),
          };
        }

        // 일부만 선택한 경우는 기존처럼 테이블 번호를 그대로 저장
        return {
          tableValue: selectedTables.join(","),
          fullRooms: selectedRooms.map((room) => room.roomName),
        };
      }

      function applyModalSeatFromMap(tableNumbers) {
        const selectedTables = Array.isArray(tableNumbers)
          ? tableNumbers.map(String)
          : [String(tableNumbers)];

        if (!selectedTables.length) return;

        const normalizedSeatPick = normalizeModalSeatPickTables(selectedTables);
        const firstSeatInfo = getSeatInfoByTableNumber(
          Number(selectedTables[0]),
        );
        const isRoom = firstSeatInfo.seat === "룸";

        document.getElementById("input-seat").value = firstSeatInfo.seat;
        toggleRoomSelect();

        document.querySelectorAll("#room-checkboxes input").forEach((cb) => {
          cb.checked = false;
        });

        if (isRoom) {
          const selectedRooms = normalizedSeatPick.fullRooms.length
            ? normalizedSeatPick.fullRooms
            : Array.from(
                new Set(
                  selectedTables
                    .map(
                      (tableNumber) =>
                        getSeatInfoByTableNumber(Number(tableNumber)).room,
                    )
                    .filter(Boolean),
                ),
              );

          document
            .querySelectorAll("#room-checkboxes .room-check")
            .forEach((cb) => {
              cb.checked = selectedRooms.includes(cb.value);
            });

          syncAllCheckbox();
        }

        document.getElementById("input-table").value =
          normalizedSeatPick.tableValue;

        updateRoomTablePreview();

        modalSeatPickMode = false;
        modalSeatPickSelectedTables = [];
        isSeatMapVisible = false;

        const mapView = document.getElementById("seat-map-view");
        const list = document.getElementById("reservation-list");
        const modal = document.getElementById("modal");

        if (mapView) {
          mapView.style.display = "none";
        }

        if (list) {
          list.style.display = "block";
        }

        if (modal) {
          modal.classList.add("show");
        }

        render();
      }

      function openTableReservation(tableNumber) {
        if (modalSeatPickMode) {
          toggleModalSeatPickTable(tableNumber);
          return;
        }

        const tableReservations = getReservationsByTable(tableNumber);

        if (moveMode) {
          if (!movingReservation) {
            if (tableReservations.length === 0) {
              alert("이동할 예약이 없는 테이블입니다.");
              return;
            }

            if (tableReservations.length === 1) {
              selectReservationForMove(tableNumber, tableReservations[0]);
              return;
            }

            showMoveSelectPopup(tableNumber, tableReservations);
            return;
          }

          moveReservationToTable(tableNumber);
          return;
        }

        if (tableReservations.length === 0) {
          openAddReservationWithTable(tableNumber);
          return;
        }

        if (tableReservations.length === 1) {
          showRoomSingleActionPopup(tableNumber, tableReservations[0]);
          return;
        }

        showTableSelectPopup(tableNumber, tableReservations);
      }

      function openAddReservationWithTable(tableNumber) {
        if (!requireLogin()) return;

        // 기존 새 예약 모달 열기 방식을 그대로 사용해서 먼저 깨끗하게 초기화
        openModal();

        // 좌석 자동 설정
        const isRoom = Number(tableNumber) >= 20;
        document.getElementById("input-seat").value = isRoom ? "룸" : "홀";
        toggleRoomSelect();

        // 룸 체크박스 초기화
        document.querySelectorAll("#room-checkboxes input").forEach((cb) => {
          cb.checked = false;
        });

        // 룸 테이블인 경우 해당 룸 자동 체크
        if (isRoom) {
          const roomMap = {
            21: "1실",
            22: "1실",
            23: "1실",
            24: "1실",
            31: "2실",
            32: "2실",
            33: "2실",
            34: "2실",
            41: "3실",
            42: "3실",
            43: "3실",
            44: "3실",
            51: "4실",
            52: "4실",
            53: "4실",
            54: "4실",
            61: "5실",
            62: "5실",
            63: "5실",
            64: "5실",
          };

          const room = roomMap[Number(tableNumber)];

          document

      function setSeatMapMode(mode) {
        seatMapMode = mode;

      function toggleMoveMode() {
        if (!requireLogin()) return;
        moveMode = !moveMode;

        if (!moveMode) {
          movingReservation = null;
          movingFromTable = null;
        }

        renderSeatMapContent();
      }

      function getSeatInfoByTableNumber(tableNumber) {
        const n = Number(tableNumber);

        if (n >= 21 && n <= 24) return { seat: "룸", room: "1실" };
        if (n >= 31 && n <= 34) return { seat: "룸", room: "2실" };
        if (n >= 41 && n <= 44) return { seat: "룸", room: "3실" };
        if (n >= 51 && n <= 54) return { seat: "룸", room: "4실" };
        if (n >= 61 && n <= 64) return { seat: "룸", room: "5실" };

        return { seat: "홀", room: "" };
      }

      async function moveReservationToTable(targetTableNumber) {
        if (!requireLogin()) return;
        if (!movingReservation) return;

        const targetReservations = getReservationsByTable(targetTableNumber);

        if (targetReservations.length >= 2) {
          alert(
            targetTableNumber +
              "번 테이블은 이미 예약이 2개라 이동할 수 없습니다.",
          );
          return;
        }

        const seatInfo = getSeatInfoByTableNumber(targetTableNumber);

        const isMovingRoomFull =
          movingReservation.seat === "룸" &&
          !String(movingReservation.table || "").trim();

        const nextTableValue =
          isMovingRoomFull && seatInfo.seat === "룸"
            ? ""
            : String(targetTableNumber);

        const testReservation = {
          ...movingReservation,
          seat: seatInfo.seat,
          room: seatInfo.room,
          table: nextTableValue,
        };

        const hasConflict = reservations.some((r) => {
          if (!r || r.id === movingReservation.id) return false;
          return isConflict(testReservation, r);
        });

        if (hasConflict) {
          const ok = confirm(
            "이동할 테이블에 시간 충돌 가능성이 있습니다.\n그래도 이동할까요?",
          );
          if (!ok) return;
        }

        const updatedReservation = {
          ...movingReservation,
          seat: seatInfo.seat,
          room: seatInfo.room,
          table: nextTableValue,
        };

        await setDoc(
          doc(db, "reservations", movingReservation.id),
          updatedReservation,
        );

        // 화면에 바로 반영하기 위해 현재 배열도 즉시 수정
        const localIndex = reservations.findIndex(
          (r) => r.id === movingReservation.id,
        );

        if (localIndex !== -1) {
          reservations[localIndex] = {
            ...updatedReservation,
            id: movingReservation.id,
          };
        }

        movingReservation = null;
        movingFromTable = null;
        moveMode = false;

        renderSeatMapContent();
      }

      function selectReservationForMove(tableNumber, reservation) {
        movingReservation = reservation;
        movingFromTable = tableNumber;
        renderSeatMapContent();

      // HTML 특수문자 처리(보안)
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text == null ? "" : String(text);
        return div.innerHTML;
      }

      function updateTVClock() {
        const now = new Date();

        const hour = String(now.getHours()).padStart(2, "0");
        const minute = String(now.getMinutes()).padStart(2, "0");

        const month = now.getMonth() + 1;
        const date = now.getDate();
        const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
        const day = weekdays[now.getDay()];

        const hourEl = document.getElementById("tv-hour");
        const minuteEl = document.getElementById("tv-minute");
        const dateEl = document.getElementById("tv-date");

        if (hourEl) hourEl.textContent = hour;
        if (minuteEl) minuteEl.textContent = minute;
        if (dateEl) dateEl.textContent = `${month}/${date} (${day})`;
      }

      setInterval(updateTVClock, 1000);
      setInterval(() => {
        const colon = document.getElementById("tv-colon");
        if (!colon) return;

        colon.style.opacity = colon.style.opacity === "0" ? "1" : "0";
      }, 500);
      updateTVClock();

      function getTodayString() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function parseLocalDate(dateString) {
        if (!dateString) return new Date();

        const match = String(dateString).match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return new Date(dateString);

        const year = Number(match[1]);
        const month = Number(match[2]) - 1;
        const day = Number(match[3]);

        return new Date(year, month, day);
      }

      function formatDateLabel(dateString) {
        if (!dateString) return "";

        const date = parseLocalDate(dateString);
        const weekNames = ["일", "월", "화", "수", "목", "금", "토"];
        const todayString = getTodayString();

        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate();
        const day = weekNames[date.getDay()];

        return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")} (${day})`;
      }

      function addDays(dateString, days) {
        const date = parseLocalDate(dateString);
        date.setDate(date.getDate() + days);

        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");

        return `${y}-${m}-${d}`;
      }

      function normalizeDateInput(value) {
        const input = String(value || "").trim();

        // 이미 yyyy-mm-dd 형식
        if (/^\d{4}-\d{2}-\d{2}$/.test(input)) {
          return input;
        }

        // 4/25 또는 4-25 형식
        const shortMatch = input.match(/^(\d{1,2})[\/\-\.](\d{1,2})$/);
        if (shortMatch) {
          const year = new Date().getFullYear();
          const month = String(Number(shortMatch[1])).padStart(2, "0");
          const day = String(Number(shortMatch[2])).padStart(2, "0");
          return `${year}-${month}-${day}`;
        }

        return input;
      }

      function getStartOfWeek(dateString) {
        const date = parseLocalDate(dateString);
        const day = date.getDay(); // 일=0
        const diff = day === 0 ? -6 : 1 - day; // 월요일 시작
        date.setDate(date.getDate() + diff);
        return date;
      }

      function getWeekDates(dateString) {
        const start = getStartOfWeek(dateString);
        const dates = [];

        for (let i = 0; i < 7; i++) {
          const current = new Date(start);
          current.setDate(start.getDate() + i);
          dates.push(formatDateString(current));
        }

        return dates;
      }

      function formatWeekRange(dateString) {
        const weekDates = getWeekDates(dateString);
        const start = parseLocalDate(weekDates[0]);
        const end = parseLocalDate(weekDates[6]);

        const startText = `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, "0")}-${String(start.getDate()).padStart(2, "0")}`;
        const endText = `${end.getFullYear()}-${String(end.getMonth() + 1).padStart(2, "0")}-${String(end.getDate()).padStart(2, "0")}`;

        return `${startText} ~ ${endText}`;

      async function deleteSelectedDateReservations() {
        if (!requireLogin()) return;

        const targetDate = selectedDate;

        if (!targetDate) {
          alert("삭제할 날짜를 찾을 수 없습니다.");
          return;
        }

        const targets = reservations.filter(
          (r) => r.date === targetDate && r.id,
        );

        if (!targets.length) {
          alert("선택된 날짜에 삭제할 예약이 없습니다.");
          return;
        }

        const targetIds = targets.map((r) => r.id);

        const previewList = targets
          .slice(0, 8)
          .map(
            (r) =>
              `- ${r.time || "-"} ${r.name || "이름없음"} / ${getPeopleDisplayText(r)}`,
          )
          .join("\n");

        const moreText =
          targets.length > 8 ? `\n...외 ${targets.length - 8}건` : "";

        const ok = confirm(
          `${targetDate} 예약 ${targets.length}건을 모두 삭제하시겠습니까?\n\n${previewList}${moreText}\n\n삭제 후 되돌릴 수 없습니다.`,
        );

        if (!ok) return;

        try {
          for (const id of targetIds) {
            await deleteDoc(doc(db, "reservations", id));
          }

          // 화면에서도 해당 날짜 예약만 정확히 제거
          reservations = reservations.filter((r) => !targetIds.includes(r.id));

          alert("당일 예약을 삭제했습니다.");
          refreshCurrentScreen();
        } catch (error) {
          console.error("당일 예약 삭제 오류:", error);
          alert("당일 예약 삭제 중 오류가 발생했습니다.");

      function inferRoomFromTableNumbers(tableText) {
        const rooms = new Set();

        String(tableText || "")
          .split(/[,\s]+/)
          .map((v) => Number(String(v).trim()))
          .filter(Boolean)
          .forEach((num) => {
            if (num >= 21 && num <= 24) rooms.add("1실");
            if (num >= 31 && num <= 34) rooms.add("2실");
            if (num >= 41 && num <= 44) rooms.add("3실");
            if (num >= 51 && num <= 54) rooms.add("4실");
            if (num >= 61 && num <= 64) rooms.add("5실");
          });

        return Array.from(rooms).join(", ");
      }

      function normalizeRoomForSave(seat, room, table) {
        if (seat !== "룸") return "";

        const cleanRoom = String(room || "").trim();
        if (cleanRoom) return cleanRoom;

        return inferRoomFromTableNumbers(table);
      }

      function isSameRoom(r1, r2) {
        const rooms1 = (r1.room || "")
          .split(",")
          .map((v) => v.trim())
          .filter(Boolean);
        const rooms2 = (r2.room || "")
          .split(",")
          .map((v) => v.trim())
          .filter(Boolean);

        return rooms1.some((r) => rooms2.includes(r));
      }

      function isSameTable(r1, r2) {
        const tables1 = (r1.table || "")
          .split(",")
          .map((v) => v.trim())
          .filter(Boolean);
        const tables2 = (r2.table || "")
          .split(",")
          .map((v) => v.trim())
          .filter(Boolean);

        return tables1.some((t) => tables2.includes(t));
      }

      function isRoomFullUsage(r) {
        // 룸인데 테이블 지정 안했으면 전체 사용
        return r.seat === "룸" && !r.table;
      }

      function isConflict(r1, r2) {
        // 날짜 다르면 무조건 OK
        if (r1.date !== r2.date) return false;

        // 시간 겹침 (간단히 동일 시간 기준, 나중에 확장 가능)
        if (!isTimeConflict(r1.time, r2.time, r1.seat, r2.seat)) return false;

        // 룸 아닌 경우는 기존 테이블만 체크
        if (r1.seat !== "룸" || r2.seat !== "룸") {
          return isSameTable(r1, r2);
        }

        // 룸 기준
        if (!isSameRoom(r1, r2)) return false;

        // 둘 중 하나라도 전체 사용이면 충돌
        if (isRoomFullUsage(r1) || isRoomFullUsage(r2)) return true;

        // 둘 다 부분 사용이면 테이블 겹치는지
        return isSameTable(r1, r2);
      }

          name +
          "\n" +
          "*주차안내 : 매장 옆 '청담더타이' 건물을 끼고 코너를 돌아 '24시 주차장'에 주차하시면 됩니다." +
          extraMenuGuide +
          "\n\n" +
          "문의사항이나 변동사항이 있으시면 꼭 매장으로 연락 부탁드립니다.\n" +
          "감사합니다.";

        const popup = document.getElementById("table-select-popup");
        if (popup) popup.classList.add("hidden");

        window.location.href =
          "sms:" +
          phone.replace(/[^0-9+]/g, "") +
          "?body=" +
          encodeURIComponent(message);
      }

      function callReservationCustomer(index) {
        const r = reservations[index];
        if (!r || !r.phone) {
          alert("전화번호가 없습니다.");
          return;
        }

        const phone = String(r.phone || "").trim();
        const name = r.name || "고객";

        const ok = confirm(
          name + " (" + phone + ") 고객에게 전화하시겠습니까?",
        );
        if (!ok) return;

        window.location.href = "tel:" + phone.replace(/[^0-9+]/g, "");
      }

      // ====== 예약 삭제 ======
      async function deleteReservation(index) {
        if (!requireLogin()) return;

        const r = reservations[index];
        if (!r) return;

        const targetId = r.id;

        if (!targetId) {
          alert("삭제할 예약을 찾을 수 없습니다.");
          return;
        }

        const summary = [
          `예약자: ${r.name || "이름없음"}`,
          `날짜: ${r.date || "-"}`,
          `시간: ${r.time || "-"}`,
          `인원: ${getPeopleDisplayText(r)}`,
        ]
          .filter(Boolean)
          .join("\n");

        const ok = confirm(
          `아래 예약을 삭제하시겠습니까?\n\n${summary}\n\n삭제 후 되돌릴 수 없습니다.`,
        );

        if (!ok) return;

        try {
          await deleteDoc(doc(db, "reservations", targetId));

          // index가 아니라 id 기준으로 정확히 하나만 제거
          reservations = reservations.filter((item) => item.id !== targetId);

          refreshCurrentScreen();
        } catch (error) {
          console.error("예약 삭제 오류:", error);
          alert("예약 삭제 중 오류가 발생했습니다.");
        }
      }

      async function clearAllReservations() {
        if (!requireLogin()) return;

        const targetDate = selectedDate;

        const dailyReservations = reservations.filter(
          (r) => (r.date || "") === targetDate,
        );

        if (dailyReservations.length === 0) {
          alert("이 날짜에 삭제할 예약이 없습니다.");
          return;
        }

        const ok = confirm(
          `${formatDateLabel(targetDate)} 예약 ${dailyReservations.length}건을 모두 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`,
        );

        if (!ok) return;

        try {
          const deleteJobs = dailyReservations
            .filter((r) => r.id)
            .map((r) => deleteDoc(doc(db, "reservations", r.id)));

          await Promise.all(deleteJobs);

          // 화면을 바로 비워주기 위해 현재 배열에서도 제거
          reservations = reservations.filter(
            (r) => (r.date || "") !== targetDate,
          );

          if (
            document.getElementById("seat-map-view").style.display === "block"
          ) {
            renderSeatMapContent();
          } else {
            render();
          }

          alert(`${formatDateLabel(targetDate)} 예약이 모두 삭제되었습니다.`);
        } catch (error) {
          console.error("당일삭제 오류:", error);
          alert("당일삭제 중 오류가 발생했습니다.");
        }
      }

      function updateTotalPeople() {
        const adult = Number(document.getElementById("input-adult").value) || 0;
        const child = Number(document.getElementById("input-child").value) || 0;
        document.getElementById("total-people").textContent = adult + child;
      }

      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) {
          closeModal();
        }
      });

      document
        .getElementById("import-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeImportModal();
          }
        });

      document
        .getElementById("import-preview-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeImportPreviewModal();
          }
        });

      document
        .getElementById("search-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeSearchModal();
          }
        });

      document
      .getElementById("week-reservation-modal")
      .addEventListener("click", function (e) {
        if (e.target === this) {
          closeWeekReservationModal();
        }
      });

      window.setView = setView;
      window.openDayView = openDayView;
      window.openImportModal = openImportModal;
      window.closeImportModal = closeImportModal;
      window.openImportPreviewModal = openImportPreviewModal;
      window.closeImportPreviewModal = closeImportPreviewModal;
      window.openSearchModal = openSearchModal;
      window.closeSearchModal = closeSearchModal;
      window.openModal = openModal;
      window.closeModal = closeModal;
      window.addReservation = addReservation;
      window.previewImport = previewImport;
      window.confirmImport = confirmImport;
      window.removePreviewItem = removePreviewItem;
      window.editPreviewItem = editPreviewItem;
      window.goToReservationFromSearch = goToReservationFromSearch;
      window.editReservationFromSearch = editReservationFromSearch;
      window.openWeekReservationModal = openWeekReservationModal;
      window.closeWeekReservationModal = closeWeekReservationModal;
      window.editReservationFromWeekModal = editReservationFromWeekModal;
      window.editReservation = editReservation;
      window.deleteReservation = deleteReservation;
      window.changeStatus = changeStatus;
      window.toggleStatus = toggleStatus;
      window.toggleSettingStatus = toggleSettingStatus;
      window.toggleNameDisplayMode = toggleNameDisplayMode;
      window.toggleTVDisplay = toggleTVDisplay;
      window.callReservationCustomer = callReservationCustomer;
      window.smsReservationCustomer = smsReservationCustomer;
      window.openSmsTemplatePopup = openSmsTemplatePopup;
      window.clearAllReservations = clearAllReservations;
      window.toggleRoomSelect = toggleRoomSelect;
      window.startModalSeatPick = startModalSeatPick;
      window.finishModalSeatPick = finishModalSeatPick;
      window.cancelModalSeatPick = cancelModalSeatPick;
      window.abandonModalSeatPick = abandonModalSeatPick;
      window.moveMonth = moveMonth;
      window.changeMonthFromPicker = changeMonthFromPicker;
      window.moveWeek = moveWeek;
      window.goToCurrentWeek = goToCurrentWeek;
      window.moveDate = moveDate;
      window.goToToday = goToToday;
      window.changeSelectedDate = changeSelectedDate;
      window.movePhoneNext = movePhoneNext;
      window.movePhonePrev = movePhonePrev;
      window.updateTotalPeople = updateTotalPeople;
      window.changeTVReservationFontSize = changeTVReservationFontSize;
      // 첫 화면 그리기
      initTimeSelects();
      document
        .getElementById("input-date")
        .addEventListener("change", function () {
          initTimeSelects(this.value);
        });

      document
        .querySelectorAll('#room-checkboxes input[type="checkbox"]')
        .forEach((cb) => {
          cb.addEventListener("change", updateRoomTablePreview);
        });

      ensureReservationDates();
      syncSelectedDateUI();
      initMobileSwipeNavigation();
      onAuthStateChanged(auth, (user) => {
        isLoggedIn = !!user;

        const loginBtn = document.getElementById("login-btn");
        const logoutBtn = document.getElementById("logout-btn");

        if (user) {
          if (loginBtn) loginBtn.style.display = "none";
          if (logoutBtn) logoutBtn.style.display = "inline-block";
        } else {
          if (loginBtn) loginBtn.style.display = "inline-block";
          if (logoutBtn) logoutBtn.style.display = "none";
        }

        // 🔥 이게 핵심 (데이터 다시 불러오기)
        subscribeReservations();
      });

      updateTotalPeople();

      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) {
          closeModal();
        }
      });

      document
        .getElementById("import-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeImportModal();
          }
        });

      document
        .getElementById("import-preview-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeImportPreviewModal();
          }
        });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          closeModal();
          closeImportModal();
          closeImportPreviewModal();
          closeSearchModal();
        }
      });

      document
        .getElementById("import-file-btn")
        .addEventListener("click", function () {
          document.getElementById("import-file-input").click();
        });

      document
        .getElementById("import-file-input")
        .addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();

          reader.onload = function (e) {
            const text = String(e.target.result || "").trim();

            if (!text) {
              alert("파일 내용이 비어 있습니다.");
              return;
            }

            document.getElementById("import-text").value = text;
            previewImport();

            event.target.value = "";
          };

          reader.onerror = function () {
            alert("파일을 읽는 중 오류가 발생했습니다.");
          };

          reader.readAsText(file, "utf-8");
        });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/soorim/service-worker.js", {
            scope: "/soorim/",
          })
          .then(() => console.log("서비스워커 등록 성공"))
          .catch((err) =>
            console.log("서비스워커 실패:", err.name, err.message, err),
          );
      }
    </script>
  </body>
</html>
